<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Ctrlx Sysid</title>
</head>
<body style="font-family: Arial, sans-serif; padding: 24px;">
  <h2>Ctrlx Sysid</h2>
  <p>Abriendo aplicación externa...</p>
  <p><a id="openLink" href="#" target="_blank" rel="noopener noreferrer">Abrir manualmente</a></p>

  <script>
    const host = window.location.hostname;
    const target = `http://${host}:8000/`;

    document.getElementById("openLink").href = target;

    const w = window.open(target, "_blank", "noopener,noreferrer");

    if (!w) {
      document.body.insertAdjacentHTML(
        "beforeend",
        "<p>El navegador bloqueó la ventana emergente. Usa el enlace manual.</p>"
      );
    }
  </script>
</body>
</html>

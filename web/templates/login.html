<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ctrlX Login | System ID</title>
    <link rel="stylesheet" href="../static/css/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <span class="brand">ctrlX</span> <span class="sub-brand">WORKS</span>
            </div>
            <p class="login-subtitle">Introduce las credenciales del dispositivo</p>
            
            <form id="loginForm">
                <div class="input-group">
                    <label for="ip">Dirección IP del Dispositivo</label>
                    <input type="text" id="ip" placeholder="Ej: 192.168.1.1" required>
                </div>

                <div class="input-group">
                    <label for="user">Usuario</label>
                    <input type="text" id="user" required>
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" required>
                </div>

                <button type="submit" class="btn-login">Conectar</button>
            </form>
            <div id="errorMessage" class="error-msg"></div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const ip = document.getElementById('ip').value;
            const user = document.getElementById('user').value;
            const pass = document.getElementById('password').value;
            
            // Concatenamos la URL según tu requerimiento
            const fullUrl = `opc.tcp://${ip}:4840`;

            const payload = {
                user: user,
                password: pass,
                url: fullUrl
            };

            try {
                // Cambia '/api/auth' por tu ruta real del backend
                const response = await fetch('/api/opua/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    localStorage.setItem('isAuth', 'true');
                    window.location.href = 'index.html';
                } else {
                    document.getElementById('errorMessage').innerText = 'Fallo en la autenticación';
                }
            } catch (err) {
                console.error("Error:", err);
            }
        });
    </script>
</body>
</html>

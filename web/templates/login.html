<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ctrlX Login | System ID</title>
    <link rel="stylesheet" href="../static/css/login.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
      /* Aseguramos que el icono se vea bien dentro del input */
      .password-wrapper {
        position: relative;
        display: flex;
        align-items: center;
      }
      .toggle-eye {
        position: absolute;
        right: 15px;
        cursor: pointer;
        color: #666;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="login-box">
        <div class="login-header">
          <span class="brand">ctrlX</span> <span class="sub-brand">WORKS</span>
        </div>
        <p class="login-subtitle">Introduce las credenciales del dispositivo</p>

        <form id="loginForm">
          <div class="input-group">
            <label for="ip">Dirección IP del Dispositivo</label>
            <input type="text" id="ip" placeholder="Ej: 192.168.1.1" required />
          </div>

          <div class="input-group">
            <label for="user">Usuario</label>
            <input type="text" id="user" required />
          </div>

          <div class="input-group">
            <label for="password">Contraseña</label>
            <div class="password-wrapper">
              <input type="password" id="password" required />
              <i id="togglePassword" class="fa-solid fa-eye toggle-eye"></i>
            </div>
          </div>

          <button type="submit" class="btn-login">Conectar</button>
        </form>
        <div id="errorMessage" class="error-msg"></div>
      </div>
    </div>

    <script>
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');

    togglePassword.addEventListener('click', function () {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        this.classList.toggle('fa-eye');
        this.classList.toggle('fa-eye-slash');
    });

    document
        .getElementById("loginForm")
        .addEventListener("submit", async (e) => {
        e.preventDefault();

        const ip = document
            .getElementById("ip")
            .value.trim()
            .replace(/\s+/g, "");
        const user = document.getElementById("user").value.trim();
        const pass = document.getElementById("password").value.trim();

        const fullUrl = `opc.tcp://${ip}:4840`;

        const payload = {
            user: user,
            password: pass,
            url: fullUrl,
        };

        try {
            const response = await fetch("/api/opcua/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
            });

            console.log("Datos enviados:", payload);

            if (response.ok) {
            localStorage.setItem("isAuth", "true");
            window.location.href = "/app";
            } else {
            document.getElementById("errorMessage").innerText =
                "Fallo en la autenticación";
            }
        } catch (err) {
            console.error("Error:", err);
            document.getElementById("errorMessage").innerText =
            "Error de conexión con el servidor";
        }
        });
    </script>
  </body>
</html>
